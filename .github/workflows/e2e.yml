name: E2E Testing

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, ready_for_review, synchronize]
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres-dialog:
        image: pgvector/pgvector:pg16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: telli_dialog_db
          POSTGRES_PASSWORD: test1234
          POSTGRES_DB: telli_dialog_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres-api:
        image: pgvector/pgvector:pg16
        ports:
          - 6543:5432
        env:
          POSTGRES_USER: telli_api_db
          POSTGRES_PASSWORD: test1234
          POSTGRES_DB: telli_api_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: ghcr.io/valkey-io/valkey:8
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:4
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_PASS: password
          RABBITMQ_DEFAULT_USER: user

    env:
      DATABASE_URL: postgresql://telli_dialog_db:test1234@127.0.0.1:5432/telli_dialog_db
      RABBITMQ_URI: amqp://user:password@127.0.0.1:5672
      VALKEY_URL: redis://127.0.0.1:6379/0
      VIDIS_CLIENT_ID: ais-chat-e2e-client
      VIDIS_CLIENT_SECRET: ClientSecret-e2e
      VIDIS_ISSUER_URI: http://localhost:8080/realms/ais-chat-local
      API_DATABASE_URL: postgresql://telli_api_db:test1234@127.0.0.1:6543/telli_api_db
      API_URL: http://localhost:3002
      API_KEY: ApiKeyForAISChatApiAdminApi
      ENCRYPTION_KEY: EncryptionKeyForEncryptedApiKeysToAISChatApi
      # Auth.js secret
      AUTH_SECRET: 'yN1a0lQ77RgeEQam5DvGaddbdUDQoxswK+21FmEqBPs='
      # S3 Storage
      OTC_SECRET_ACCESS_KEY: ${{ secrets.OTC_SECRET_ACCESS_KEY }}
      OTC_ACCESS_KEY_ID: ${{ secrets.OTC_ACCESS_KEY_ID }}
      OTC_S3_HOSTNAME: ${{ secrets.OTC_S3_HOSTNAME }}
      OTC_BUCKET_NAME: ${{ secrets.OTC_BUCKET_NAME }}
      # Disable telemetry
      NEXT_TELEMETRY_DISABLED: 1
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Keycloak container cannot be started under services, because it needs to mount files from the repo
      - name: Start keycloak container (in background)
        run: |
          docker run \
            --name keycloak \
            -v "$PWD/devops/docker/keycloak:/opt/keycloak/data/import" \
            -p 8080:8080 \
            -e CLIENT_NAME=$VIDIS_CLIENT_ID -e CLIENT_SECRET=$VIDIS_CLIENT_SECRET \
            --entrypoint /opt/keycloak/data/import/entrypoint.sh \
            quay.io/keycloak/keycloak:26.6.1 > /tmp/keycloak.log 2>&1 &

      # crawl4ai is not started under services because its large image (~40s pull) would delay the whole pipeline
      - name: Start crawl4ai container (in background)
        run: |
          docker run \
            --name crawl4ai \
            --shm-size=2gb \
            -p 11235:11235 \
            unclecode/crawl4ai:0.8.6 > /tmp/crawl4ai.log 2>&1 &

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: pnpm --filter ais-chat-app exec playwright install chromium firefox

      - name: Start ais-chat-api
        run: |
          pnpm --filter ais-chat-api dev > /tmp/ais-chat-api.log 2>&1 &
          timeout=60
          elapsed=0
          until wget -qO- http://localhost:3002/health > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "ais-chat-api did not become ready within ${timeout}s"
              exit 1
            fi
            echo "$(date) - waiting for ais-chat-api to be ready"
            sleep 1
            elapsed=$((elapsed + 1))
          done
        env:
          PORT: 3002

      - name: Seed ais-chat-api database
        # db:seed will print the generated API KEY on the console
        # The output is captured in GITHUB_ENV for seeding ais-chat-app
        run: |
          pnpm --filter @ais-chat/api-database db:seed | tee /tmp/out.txt
          grep -E '^DE_[A-Z0-9_]*_API_KEY=' /tmp/out.txt >> "$GITHUB_ENV"
        env:
          LLM_IONOS_API_KEY: ${{ secrets.LLM_IONOS_API_KEY }}
          LLM_IONOS_BASE_URL: ${{ secrets.LLM_IONOS_BASE_URL }}
          LLM_GPT4OMINI_API_KEY: ${{ secrets.LLM_GPT4OMINI_API_KEY }}
          LLM_GPT4OMINI_BASE_URL: ${{ secrets.LLM_GPT4OMINI_BASE_URL }}
          LLM_GPT5NANO_API_KEY: ${{ secrets.LLM_GPT5NANO_API_KEY }}
          LLM_GPT5NANO_BASE_URL: ${{ secrets.LLM_GPT5NANO_BASE_URL }}

      - name: Run migrations and seed database (if applicable)
        run: pnpm --filter @ais-chat/shared db:migrate && pnpm --filter @ais-chat/shared db:seed

      - name: Cache turbo build cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-e2e-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-e2e-${{ runner.os }}-

      # Build and start the app the same way as in the prod container (Next.js standalone)
      - name: Start application
        run: |
          pnpm --filter ais-chat-app build:envless
          cd apps/dialog
          mkdir -p .next/standalone/apps/dialog/.next
          cp -a .next/static .next/standalone/apps/dialog/.next/
          cp -a public .next/standalone/apps/dialog/
          cd .next/standalone
          node ./apps/dialog/server.js > /tmp/ais-chat-app.log 2>&1 &
        env:
          NODE_ENV: test
          LINKUP_API_KEY: ${{ secrets.LINKUP_API_KEY }}

      - name: Run E2E tests (app)
        run: pnpm --filter ais-chat-app e2e
        env:
          CI: true

      - name: Run E2E tests (api)
        run: pnpm --filter ais-chat-api e2e
        env:
          CI: true
          DE_TEST_API_KEY: ${{ env.DE_TEST_API_KEY }}

      - name: Upload Playwright reports (app)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/dialog/playwright-report
          retention-days: 30

      - name: Upload Playwright reports (api)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-playwright-report
          path: apps/api/playwright-report
          retention-days: 30

      - name: Print ais-chat-api logs
        if: always()
        run: |
          echo "=== ais-chat-api logs ==="
          cat /tmp/ais-chat-api.log || true

      - name: Print ais-chat-app logs
        if: always()
        run: |
          echo "=== ais-chat-app logs ==="
          cat /tmp/ais-chat-app.log || true

      - name: Print crawl4ai logs
        if: always()
        run: |
          echo "=== crawl4ai logs ==="
          cat /tmp/crawl4ai.log || true

      - name: Print keycloak logs
        if: always()
        run: |
          echo "=== keycloak logs ==="
          cat /tmp/keycloak.log || true
